<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<link rel="stylesheet" href="navigation.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<nav class="navigation">

    <!-- HAMBURGER -->
    <button class="menu-button" onclick="toggleMenu(this)">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- LOGO -->
    <h1 class="logo">Altos <span>Car Imports</span></h1>

    <!-- MENU -->
    <div class="menu-list" id="menuList">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

    <!-- USER -->
    <div class="user">
        <i class="fa-solid fa-user"></i>
    </div>

</nav>
<main>
    <h1>FIXTURES</h1>
    <table class="fixtures-table">
        <th>Date</th>
        <th>Competition</th>
        <th>Fixture</th>
        <th>Stadium</th>
    </table>
</main>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu(document.querySelector('.menu-button'))"></div>

<script>
function toggleMenu(btn) {
    document.getElementById("menuList").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("show");
    btn.classList.toggle("active");
}

// auto-close when clicking links
document.querySelectorAll(".menu-list a").forEach(link => {
    link.addEventListener("click", () => {
        document.getElementById("menuList").classList.remove("active");
        document.getElementById("overlay").classList.remove("show");
        document.querySelector(".menu-button").classList.remove("active");
    });
});
</script>
<script>
window.addEventListener("scroll", function () {
    const nav = document.querySelector(".navigation");

    if (window.scrollY > 50) {
        nav.classList.add("shrink");
    } else {
        nav.classList.remove("shrink");
    }
});
</script>

</body>
</html>
