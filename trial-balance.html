<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Makwacha - Trial Balance</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f6f9;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header{
  background:#001F54;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
  font-size:13px;
}

.back-btn{
  background:#6c757d;
  color:white;
}

.print-btn{
  background:#28a745;
  color:white;
}

.content{
  padding:20px;
}

.info{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  color:#666;
  font-size:14px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#001F54;
  color:white;
  padding:12px;
  text-align:left;
}

td{
  padding:10px;
  border-bottom:1px solid #ddd;
}

.number{
  text-align:right;
}

.total-row{
  background:#f8f9fa;
  font-weight:bold;
}

.balanced{
  color:green;
  font-weight:bold;
}

.unbalanced{
  color:red;
  font-weight:bold;
}

.status-box{
  margin-top:15px;
  text-align:right;
  font-size:16px;
}

@media print{
  .actions{ display:none !important; }
  body{ background:white; }
  .card{ box-shadow:none; }
  th{
    background:#001F54 !important;
    color:white !important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
  <h2>Trial Balance</h2>
  <div class="actions">
    <button class="btn back-btn" onclick="goBack()">⬅ Back</button>
    <button class="btn print-btn" onclick="window.print()">🖨 Print</button>
  </div>
</div>

<div class="content">

<div class="info">
  <div>Date Generated: <span id="reportDate"></span></div>
  <div id="balanceStatus"></div>
</div>

<table>
<thead>
<tr>
  <th>Account</th>
  <th class="number">Debit</th>
  <th class="number">Credit</th>
</tr>
</thead>

<tbody id="trialBody"></tbody>

<tfoot>
<tr class="total-row">
  <th>TOTAL</th>
  <th class="number" id="totDr">0.00</th>
  <th class="number" id="totCr">0.00</th>
</tr>
</tfoot>
</table>

</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCSH1HUsE50pWUjmNc2coe5e8z7njt_NsQ",
  authDomain: "makwacha-accounting-app.firebaseapp.com",
  projectId: "makwacha-accounting-app"
});

const db = getFirestore(app);

/* BACK */
window.goBack = function(){
  window.location.href = "reports.html";
};

/* DATE */
document.getElementById("reportDate").textContent =
  new Date().toLocaleDateString();

/* =========================
   LOAD TRIAL BALANCE (FIXED)
========================= */
async function loadTrialBalance() {

  const accounts = {};

  const [journalsSnap, journalSnap] = await Promise.all([
    getDocs(collection(db, "journals")),
    getDocs(collection(db, "journal"))
  ]);

  function process(snap){

    snap.forEach(docSnap => {

      const j = docSnap.data();

      if (j.status && j.status !== "Posted") return;

      (j.lines || []).forEach(line => {

        // 🔥 SAME LOGIC AS YOUR LEDGER
        const accountKey =
          line.account ||
          line.accountName ||
          line.accountCode ||
          line.accountId ||
          "Unknown";

        const key = accountKey;

        if (!accounts[key]) {
          accounts[key] = {
            name: accountKey,
            debit: 0,
            credit: 0
          };
        }

        accounts[key].debit += Number(line.debit || 0);
        accounts[key].credit += Number(line.credit || 0);

      });

    });

  }

  process(journalsSnap);
  process(journalSnap);

  render(Object.values(accounts));
}

/* =========================
   RENDER
========================= */
function render(data){

  const tbody = document.getElementById("trialBody");
  tbody.innerHTML = "";

  let totalDebit = 0;
  let totalCredit = 0;

  data.forEach(acc => {

    const balance = acc.debit - acc.credit;

    let dr = "";
    let cr = "";

    if(balance >= 0){
      dr = balance;
      totalDebit += balance;
    } else {
      cr = Math.abs(balance);
      totalCredit += Math.abs(balance);
    }

    tbody.innerHTML += `
      <tr>
        <td>${acc.name}</td>
        <td class="number">${dr ? dr.toFixed(2) : ""}</td>
        <td class="number">${cr ? cr.toFixed(2) : ""}</td>
      </tr>
    `;
  });

  document.getElementById("totDr").textContent = totalDebit.toFixed(2);
  document.getElementById("totCr").textContent = totalCredit.toFixed(2);

  const diff = Math.abs(totalDebit - totalCredit);

  document.getElementById("balanceStatus").innerHTML =
    diff < 0.01
      ? `<span class="balanced">✔ Balanced</span>`
      : `<span class="unbalanced">✖ Out by ${diff.toFixed(2)}</span>`;
}

/* INIT */
loadTrialBalance();

</script>

</body>
</html>
