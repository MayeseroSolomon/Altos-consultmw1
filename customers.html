<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    min-height:100vh;
    background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#1e2a38;
    color:white;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
}

.sidebar button{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border:none;
    border-radius:5px;
    background:#34495e;
    color:white;
    cursor:pointer;
    text-align:left;
}

.sidebar button:hover{
    background:#4b6584;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.add-btn{
    background:#001F54;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.add-btn:hover{
    background:#218838;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#001F54;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

tbody tr{
    cursor:pointer;
}

tbody tr:hover{
    background:#f1f1f1;
}

.loading{
    text-align:center;
    padding:20px;
}

.logo-wrapper{
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #f4f6f9;
  border-radius: 15px;
}

.logo-wrapper img{
  width: clamp(50px,15vw,100px);
  max-width: 150px;
  min-width: 80px;
  height: auto;
}

.active{
    background: #007bff !important;
}


/* =========================
   HAMBURGER (ADDED)
========================= */
.menuBtn {
  display: none;
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 2000;
  font-size: 24px;
  background: #2d89ef;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* =========================
   MOBILE NAV (ADDED)
========================= */
@media (max-width: 768px) {

  body {
    flex-direction: column;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: -240px;
    height: 100%;
    transition: 0.3s ease;
    z-index: 1000;
  }

  .sidebar.show {
    left: 0;
  }

  .menuBtn {
    display: block;
  }
}
</style>
</head>

<body>
    <button class="menuBtn" onclick="toggleSidebar()" id="menuBtn">☰</button>


<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo-wrapper">
  <img src="pictures/silver strikers logo.png" alt="company-logo"></div><br>
    <h2>Accounting</h2>

    <button onclick="go('dashboard.html')">Dashboard</button>
    <button onclick="go('Chart-of-accounts.html')">Chart of Accounts</button>
    <button onclick="go('invoice-list.html')">Invoices</button>
    <button class="active" onclick="go('customers.html')">Customers</button>
    <button onclick="go('journallist.html')">Journals</button>
    <button onclick="go('journal-ledger.html')">Ledger</button>
    <button onclick="go('reports.html')">Reports</button>
</div>

<!-- MAIN -->
<div class="main">

    <div class="top-bar">
        <h2>Customers</h2>
        <button class="add-btn" onclick="openAddCustomer()">
            + Add Customer
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Customer Code</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Date Added</th>
            </tr>
        </thead>

        <tbody id="customerTable">
            <tr>
                <td colspan="5" class="loading">
                    Loading customers...
                </td>
            </tr>
        </tbody>
    </table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCSH1HUsE50pWUjmNc2coe5e8z7njt_NsQ",
  authDomain: "makwacha-accounting-app.firebaseapp.com",
  projectId: "makwacha-accounting-app"
});

const db = getFirestore(app);

async function loadCustomers() {
  const table = document.getElementById("customerTable");

  const snapshot = await getDocs(collection(db, "customers"));

  table.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    const code = data.customerCode || data.code || "";

    const date = data.createdAt?.toDate ? data.createdAt.toDate() : new Date();

    table.innerHTML += `
      <tr onclick="viewCustomer('${code}')">
        <td>${code}</td>
        <td>${data.name || ""}</td>
        <td>${data.phone || ""}</td>
        <td>${data.email || ""}</td>
        <td>${date.toLocaleDateString()}</td>
      </tr>
    `;
  });
}

/* ✅ ADDED: MOBILE TOGGLE */
window.toggleSidebar = function () {
  const sidebar = document.querySelector(".sidebar");
  const btn = document.getElementById("menuBtn");

  sidebar.classList.toggle("show");

  btn.textContent = sidebar.classList.contains("show") ? "✖" : "☰";
};

/* auto close on click */
document.querySelectorAll(".sidebar button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelector(".sidebar").classList.remove("show");
    document.getElementById("menuBtn").textContent = "☰";
  });
});

loadCustomers();

window.go = page => window.location.href = page;
window.openAddCustomer = () => window.location.href = "addcustomer.html";

window.viewCustomer = function(code) {
  window.location.href = "customer-view.html?code=" + encodeURIComponent(code);
};
</script>
</body>
</html>
