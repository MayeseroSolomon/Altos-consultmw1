<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Management - Makwacha</title>

<style>
* {
  font-family: Arial;
  box-sizing: border-box;
}

/* =========================
   LAYOUT
========================= */
body {
  display: flex;
  height: 100vh;
  margin: 0;
  background: #f4f6f9;
}

/* LOADER */
#loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f4f6f9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 9999;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
  width: 220px;
  background: #1e2a38;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
  font-size: 18px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  background: transparent;
  border: 1px solid #34495e;
  color: white;
  cursor: pointer;
  text-align: left;
  border-radius: 5px;
}

.sidebar button:hover {
  background: #34495e;
}

.active {
  background: #007bff !important;
}

/* =========================
   MAIN
========================= */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

h2 {
  margin: 0;
}

/* BUTTONS */
.backBtn {
  padding: 8px 15px;
  background: #2d89ef;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.backBtn:hover {
  background: #1b5fbf;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

th {
  background: #2d89ef;
  color: white;
  padding: 12px;
  text-align: left;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #f1f1f1;
}

/* STATUS */
.status-active {
  color: green;
  font-weight: bold;
}

.status-disabled {
  color: red;
  font-weight: bold;
}

/* =========================
   HAMBURGER BUTTON
========================= */
.menuBtn {
  display: none;
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 2000;

  font-size: 24px;
  background: #2d89ef;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* =========================
   MOBILE VIEW
========================= */
@media (max-width: 768px) {

  body {
    flex-direction: column;
  }

  .sidebar {
    position: fixed;
    left: -220px;
    top: 0;
    height: 100%;
    width: 220px;
    transition: 0.3s ease;
    z-index: 1000;
  }

  .sidebar.show {
    left: 0;
  }

  .main {
    margin-left: 0;
    width: 100%;
  }

  .menuBtn {
    display: inline-block;
  }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- HAMBURGER -->
<button class="menuBtn" onclick="toggleSidebar()" id="menuBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Accounting</h2>

  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('chart-of-accounts.html')">Chart of Accounts</button>
  <button onclick="go('invoice-list.html')">Invoices</button>
  <button onclick="go('customers.html')">Customers</button>
  <button onclick="go('journallist.html')">Journals</button>
  <button onclick="go('journal-ledger.html')">Ledger</button>

  <button class="active" onclick="go('users.html')">Users</button>

  <button onclick="go('reports.html')">Reports</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>User Management</h2>

    <div>
      <button class="backBtn" onclick="go('dashboard.html')">Back</button>

      <button onclick="go('userform.html')" style="
        background:#2d89ef;
        color:white;
        border:none;
        padding:8px 12px;
        border-radius:5px;
        cursor:pointer;
        margin-left:10px;">
        + Add User
      </button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Created</th>
      </tr>
    </thead>

    <tbody id="userTable"></tbody>
  </table>

</div>
<script type="module">

import { auth, db } from "./firebase.js";

import {
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { protectPage } from "./permissions.js";

protectPage("userlist");



/* NAV */
window.go = (page) => {
  window.location.href = page;
};

/* SIDEBAR */
window.toggleSidebar = () => {
  const sidebar = document.querySelector(".sidebar");
  const btn = document.getElementById("menuBtn");

  sidebar.classList.toggle("show");
  btn.textContent = sidebar.classList.contains("show") ? "✖" : "☰";
};

document.querySelectorAll(".sidebar button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelector(".sidebar").classList.remove("show");
    document.getElementById("menuBtn").textContent = "☰";
  });
});

/* AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "loginform.html";
    return;
  }

  await loadUsers();

  document.getElementById("loader").style.display = "none";
});

/* LOAD USERS */
async function loadUsers() {

  const table = document.getElementById("userTable");
  table.innerHTML = "";

  try {

    const snapshot = await getDocs(collection(db, "users"));

    if (snapshot.empty) {
      table.innerHTML = `
        <tr>
          <td colspan="6" style="text-align:center;">
            No users found
          </td>
        </tr>
      `;
      return;
    }

    snapshot.forEach((doc) => {

      const u = doc.data();

      const statusClass =
        u.status === "Active"
          ? "status-active"
          : "status-disabled";

      table.innerHTML += `
        <tr>
          <td>${u.fullname || ""}</td>
          <td>${u.username || ""}</td>
          <td>${u.email || ""}</td>
          <td>${u.role || ""}</td>
          <td class="${statusClass}">${u.status || ""}</td>
          <td>${u.createdAt || ""}</td>
        </tr>
      `;
    });

  } catch (err) {

    console.error("Error loading users:", err);

    table.innerHTML = `
      <tr>
        <td colspan="6" style="color:red;text-align:center;">
          ${err.message}
        </td>
      </tr>
    `;
  }
}
</script>
</body>
</html>
